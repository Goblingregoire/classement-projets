<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administrateur</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 10vh auto;
            padding: 0 1rem;
            position: relative;
            z-index: 5;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        
        .login-header {
            margin-bottom: 2rem;
        }
        
        .login-logo {
            max-width: 80px;
            height: auto;
            border-radius: 50%;
            background: white;
            padding: 8px;
            margin-bottom: 1rem;
        }
        
        .login-title {
            color: var(--primary-color);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: #6b7280;
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(211, 159, 39, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .success-message {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            color: #16a34a;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .back-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--secondary-color);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive Design pour le login */
        @media (max-width: 768px) {
            .login-container {
                margin: 5vh auto;
                padding: 0 1rem;
            }
            
            .login-card {
                padding: 2rem;
                margin: 0 0.5rem;
            }
            
            .login-logo {
                max-width: 60px;
                margin-bottom: 0.75rem;
            }
            
            .login-title {
                font-size: 1.5rem;
                margin-bottom: 0.5rem;
            }
            
            .login-subtitle {
                font-size: 0.9rem;
            }
            
            .form-group {
                margin-bottom: 1.25rem;
            }
            
            .form-group label {
                font-size: 0.95rem;
                margin-bottom: 0.375rem;
            }
            
            .form-group input {
                padding: 0.625rem;
                font-size: 0.95rem;
            }
            
            .login-btn {
                padding: 0.75rem;
                font-size: 0.95rem;
                margin-bottom: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 2vh auto;
                padding: 0 0.5rem;
            }
            
            .login-card {
                padding: 1.5rem;
                margin: 0;
                border-radius: 8px;
            }
            
            .login-logo {
                max-width: 50px;
                margin-bottom: 0.5rem;
            }
            
            .login-title {
                font-size: 1.3rem;
            }
            
            .login-subtitle {
                font-size: 0.85rem;
                margin-bottom: 1rem;
            }
            
            .form-group {
                margin-bottom: 1rem;
            }
            
            .form-group label {
                font-size: 0.9rem;
            }
            
            .form-group input {
                padding: 0.5rem;
                font-size: 0.9rem;
            }
            
            .login-btn {
                padding: 0.625rem;
                font-size: 0.9rem;
            }
            
            .back-link {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 1rem;
            }
            
            .login-title {
                font-size: 1.2rem;
            }
            
            .form-group input {
                padding: 0.5rem;
                font-size: 0.85rem;
            }
            
            .login-btn {
                padding: 0.5rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="logo-2.png" alt="Logo" class="login-logo">
                <h1 class="login-title">Connexion Admin</h1>
                <p class="login-subtitle">Accès au panneau d'administration</p>
            </div>

            <form id="loginForm">
                <div id="messageContainer"></div>
                
                <div class="form-group">
                    <label for="username">Nom d'utilisateur:</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe:</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Se connecter
                </button>
            </form>
            
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="index.html" class="back-link">← Retour au formulaire</a>
            </div>
        </div>
    </div>

    <script>
        // Configuration des identifiants (à modifier selon vos besoins)
        const ADMIN_CONFIG = {
            username: 'admin',
            password: 'MarignyBICHET2026'
        };

        // Vérification si déjà connecté
        function checkAuthStatus() {
            const authToken = sessionStorage.getItem('adminAuthToken');
            if (authToken && authToken === 'authenticated') {
                window.location.href = 'admin.html';
                return true;
            }
            return false;
        }

        // Affichage des messages
        function showMessage(message, type = 'error') {
            const container = document.getElementById('messageContainer');
            const messageClass = type === 'success' ? 'success-message' : 'error-message';
            
            container.innerHTML = `<div class="${messageClass}">${message}</div>`;
            
            // Auto-suppression après 5 secondes
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Simulation de connexion (à remplacer par un vrai système backend)
        function simulateLogin(username, password) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (username === ADMIN_CONFIG.username && password === ADMIN_CONFIG.password) {
                        resolve({ success: true, token: 'authenticated' });
                    } else {
                        reject(new Error('Identifiants incorrects'));
                    }
                }, 1000); // Simulation de délai réseau
            });
        }

        // Gestion du formulaire de connexion
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            // Désactiver le bouton et afficher le chargement
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span>Connexion...';
            
            try {
                const result = await simulateLogin(username, password);
                
                if (result.success) {
                    // Stocker le token d'authentification
                    sessionStorage.setItem('adminAuthToken', result.token);
                    sessionStorage.setItem('adminLoginTime', Date.now().toString());
                    
                    showMessage('Connexion réussie ! Redirection...', 'success');
                    
                    // Redirection vers le panneau d'administration
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1500);
                }
            } catch (error) {
                showMessage(error.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Se connecter';
            }
        });

        // Vérification au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuthStatus()) {
                // Focus sur le champ username
                document.getElementById('username').focus();
            }
        });

        // Gestion de la touche Entrée
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                if (form.checkValidity()) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
